<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BART IS LISTENING</title>
  <style>
    body {
      background-color: #0b0d13;
      color: #cbd5e1;
      font-family: 'Courier New', monospace;
      text-align: center;
      padding: 60px;
    }

    h1 {
      font-size: 3rem;
      color: #d1d5db;
      margin-bottom: 30px;
    }

    textarea {
      width: 80%;
      max-width: 800px;
      height: 300px;
      background-color: #111;
      color: #cbd5e1;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      padding: 12px;
      border: 1px solid #666;
      resize: vertical;
    }

    button {
      margin-top: 20px;
      background-color: #333;
      color: #fff;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background-color: #444;
    }

    #response {
      margin-top: 40px;
      font-style: italic;
      color: #99c;
      font-size: 1.2rem;
      padding: 0 40px;
    }
  </style>
</head>
<body>
  <h1>BART IS LISTENING</h1>
  <form id="soulForm">
    <textarea id="input" placeholder="Unburden your soul here..." required></textarea><br />
    <button type="submit" id="proceed">PROCEED</button>
  </form>
  <div id="response"></div>

  <script>
    document.getElementById("soulForm").addEventListener("submit", async function(event) {
      event.preventDefault();

      const input = document.getElementById("input").value;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ input: input })
        });

        const data = await res.json();
        document.getElementById("response").innerText = data.response || "Bart says nothing.";
      } catch (err) {
        document.getElementById("response").innerText = "Bart has laryngitis. Something went wrong.";
        console.error("Bart error:", err);
      }
    });

    // Enable Enter key to trigger the PROCEED button
    document.getElementById("input").addEventListener("keydown", function (event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault(); // prevent newline
        document.getElementById("proceed").click();
      }
    });
  </script>
</body>
</html>
