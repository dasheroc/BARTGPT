<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bart Is Listening</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #0a0d14;
      color: #aebbcf;
      font-family: 'Share Tech Mono', monospace;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 3rem;
      color: #cdd4da;
      margin-bottom: 2rem;
      letter-spacing: 2px;
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    textarea {
      width: 90%;
      max-width: 1000px;
      height: 300px;
      background-color: #111215;
      color: #aebbcf;
      font-size: 1rem;
      padding: 1rem;
      border: 1px solid #3c4043;
      border-radius: 4px;
      resize: none;
      font-family: 'Share Tech Mono', monospace;
    }

    button {
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background-color: #22252a;
      color: #cdd4da;
      border: 1px solid #5f6368;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #2c3036;
    }

    .response {
      margin-top: 2rem;
      font-style: italic;
      font-size: 1rem;
      color: #82cfff;
      max-width: 1000px;
      margin-left: auto;
      margin-right: auto;
      white-space: pre-wrap;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #7a8ca3;
    }

    .footer em {
      color: #a5cfe8;
    }
  </style>
</head>
<body>
  <h1>BART IS LISTENING</h1>
  <form id="chatForm" method="post">
    <textarea name="soul" placeholder="Unburden your soul here..." required></textarea>
    <button type="submit">PROCEED</button>
  </form>

  {% if response %}
    <div class="response">
      Bart speaks from the abyss: <em>"{{ response }}"</em>
    </div>
  {% endif %}

  <div class="footer">
    Bart speaks from the abyss: “What time is it?” – curious. But not clever.
  </div>

  <script>
    document.getElementById("chatForm").addEventListener("submit", function(event) {
      const textarea = document.querySelector("textarea");
      if (!textarea.value.trim()) {
        event.preventDefault();
      }
    });

    document.querySelector("textarea").addEventListener("keydown", function(event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        document.getElementById("chatForm").submit();
      }
    });
  </script>
</body>
</html>
