<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bart Interface</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #0b0e16;
      color: #cfd8dc;
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      color: #cfd8dc;
      text-align: center;
      margin-bottom: 2rem;
      letter-spacing: 0.1em;
    }

    textarea {
      background-color: #111;
      color: #cfd8dc;
      width: 80vw;
      height: 300px;
      font-size: 1rem;
      padding: 1rem;
      border: 1px solid #444;
      resize: vertical;
      font-family: 'Share Tech Mono', monospace;
    }

    button {
      margin-top: 1rem;
      padding: 0.7rem 1.5rem;
      font-size: 1rem;
      font-family: 'Share Tech Mono', monospace;
      background-color: #222;
      color: #f1f1f1;
      border: 1px solid #555;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #333;
    }

    #response {
      margin-top: 2rem;
      font-style: italic;
      color: #90caf9;
      max-width: 80vw;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>BART IS LISTENING</h1>
  <textarea id="input" placeholder="Unburden your soul here..."></textarea>
  <button id="proceed">PROCEED</button>
  <div id="response"></div>

  <script>
    async function sendInput() {
      const userInput = document.getElementById("input").value.trim();
      const responseDiv = document.getElementById("response");

      if (!userInput) {
        responseDiv.textContent = "🧠 Bart raises an eyebrow. Say more.";
        return;
      }

      const res = await fetch("/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ user_input: userInput }),
      });

      const data = await res.json();
      responseDiv.textContent = data.response;
    }

    document.getElementById("proceed").addEventListener("click", sendInput);

    // Enable Enter key to trigger PROCEED unless Shift is held
    document.getElementById("input").addEventListener("keydown", function (event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        document.getElementById("proceed").click();
      }
    });
  </script>
</body>
</html>
