<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bart Is Listening</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='favicon.ico') }}">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b0e17;
            color: #9eb3c2;
            font-family: 'Share Tech Mono', monospace;
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        form {
            margin-top: 40px;
        }

        textarea {
            background-color: #11141c;
            color: #cbd7e1;
            width: 80%;
            height: 180px;
            font-size: 1.1em;
            border: 1px solid #333;
            padding: 12px;
            resize: none;
            outline: none;
        }

        button {
            margin-top: 20px;
            padding: 10px 30px;
            background-color: #333;
            color: #9eb3c2;
            border: none;
            cursor: pointer;
            font-size: 1em;
        }

        button:hover {
            background-color: #444;
        }

        blockquote {
            font-style: italic;
            color: #5a7584;
            margin-top: 50px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <h1>BART IS LISTENING</h1>
    <form method="post">
        <textarea name="query" placeholder="Unburden your soul here..." onkeydown="if(event.key==='Enter' && !event.shiftKey){this.form.submit(); return false;}">{{ request.form.get('query', '') if request.method == 'POST' else '' }}</textarea>
        <br>
        <button type="submit">PROCEED</button>
    </form>

    {% if result %}
    <blockquote>
        Bart speaks from the abyss: “{{ result }}”
    </blockquote>
    {% endif %}
</body>
</html>
