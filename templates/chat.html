<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bart is Listening</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='favicon.ico') }}">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    body { background:#0a0d14; color:#aebbcf; font-family:'Share Tech Mono', monospace; text-align:center; padding:2rem; }
    h1 { font-size:3rem; margin-bottom:2rem; letter-spacing:2px; }
    form { display:flex; flex-direction:column; align-items:center; }
    textarea {
      width:90%; max-width:1000px; height:300px;
      background:#111215; color:#aebbcf; font-size:1rem;
      padding:1rem; border:1px solid #444; resize:none;
      font-family:'Share Tech Mono', monospace;
    }
    button {
      margin-top:1.5rem; padding:0.75rem 2rem;
      background:#22252a; color:#cdd4da; border:1px solid #5f6368;
      cursor:pointer; font-family:'Share Tech Mono', monospace;
      transition:background 0.3s;
    }
    button:hover { background:#2c3036; }
    .response { margin-top:2rem; font-style:italic; font-size:1rem; color:#82cfff; max-width:1000px; margin:0 auto; white-space:pre-wrap; }
  </style>
</head>
<body>
  <h1>BART IS LISTENING</h1>
  <form method="post" action="/">
    <textarea name="soul" placeholder="Unburden your soul here..." required autofocus>{{ input or '' }}</textarea>
    <button type="submit">PROCEED</button>
  </form>
  {% if response %}
    <div class="response">{{ response }}</div>
  {% endif %}
  <script>
    document.querySelector("textarea").addEventListener("keydown", function(e){
      if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); this.form.submit(); }
    });
  </script>
</body>
</html>
