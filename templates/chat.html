<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bart is Listening</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='favicon.ico') }}">
    <style>
        body {
            background-color: #0b0d13;
            color: #b0bec5;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 30px;
            color: #cfd8dc;
            letter-spacing: 2px;
        }

        textarea {
            width: 80%;
            height: 250px;
            background-color: #111316;
            color: #cfd8dc;
            font-size: 1.1em;
            font-family: 'Courier New', Courier, monospace;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            margin-top: 25px;
            padding: 12px 28px;
            font-size: 1em;
            background-color: #333;
            color: #90caf9;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #444;
        }

        #response {
            margin-top: 60px;
            font-size: 1.2em;
            color: #81d4fa;
            font-style: italic;
            max-width: 80%;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <h1>BART IS LISTENING</h1>
    <form method="post">
        <textarea name="user_input" placeholder="Unburden your soul here..." required></textarea>
        <br>
        <button type="submit">PROCEED</button>
    </form>

    {% if response %}
        <div id="response">
            Bart speaks from the abyss: “{{ response }}” — curious. But not clever.
        </div>
    {% endif %}
</body>
</html>
