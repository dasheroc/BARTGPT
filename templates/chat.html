<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BartAPI Chat</title>
  <style>
    body {
      background-color: #111;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    form {
      display: flex;
      flex-direction: column;
      width: 400px;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
      background-color: #222;
      color: #eee;
      border: 1px solid #444;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 12px;
    }

    button {
      background-color: #1a1a1a;
      color: #f1f1f1;
      border: none;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    button:hover {
      background-color: #333;
    }

    .response {
      margin-top: 20px;
      padding: 12px;
      background-color: #222;
      border: 1px solid #444;
      color: #ccc;
    }
  </style>
</head>
<body>

  <form method="post">
    <textarea name="user_input" placeholder="Speak, friend…" required></textarea>
    <button type="submit">PROCEED</button>
  </form>

  {% if user_input %}
    <div class="response">
      <strong>You said:</strong> {{ user_input }}
    </div>
  {% endif %}

  <script>
    const textarea = document.querySelector("textarea");
    const form = document.querySelector("form");

    textarea.addEventListener("keydown", function (event) {
      if (event.key === "Enter" && !event.shiftKey && textarea.value.trim()) {
        event.preventDefault();
        form.submit();
      }
    });
  </script>

</body>
</html>
