<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BartAPI Chat</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <style>
    body {
      background-color: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    form {
      text-align: center;
      width: 100%;
      max-width: 600px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      font-size: 1rem;
      background-color: #1a1a1a;
      color: #fff;
      border: 1px solid #444;
      border-radius: 6px;
      resize: none;
      box-sizing: border-box;
    }

    button {
      margin-top: 12px;
      padding: 12px 24px;
      font-size: 1rem;
      background-color: #333;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #555;
    }

    .response {
      margin-top: 2rem;
      text-align: left;
      font-style: italic;
      color: #cfcfcf;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <form method="post">
    <textarea name="user_input" placeholder="Speak, friend…" autofocus required></textarea>
    <br />
    <button type="submit">PROCEED</button>
  </form>

  {% if user_input %}
    <div class="response">
      <strong>You said:</strong><br>{{ user_input }}
    </div>
  {% endif %}

  <script>
    const textarea = document.querySelector("textarea");
    const form = document.querySelector("form");

    textarea.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.submit();
      }
    });
  </script>
</body>
</html>
