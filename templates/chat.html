<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bart is Listening</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #111;
            color: #b0c4de;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 40px;
            letter-spacing: 0.1em;
        }

        textarea {
            width: 80vw;
            max-width: 800px;
            height: 300px;
            background-color: #1c1c1c;
            color: #e0e0e0;
            border: 1px solid #555;
            padding: 12px;
            font-size: 1em;
            resize: none;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1em;
            background-color: #222;
            color: #b0c4de;
            border: 1px solid #555;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #444;
        }

        #response {
            margin-top: 40px;
            max-width: 800px;
            text-align: left;
            white-space: pre-wrap;
            color: #ccc;
            font-size: 1.1em;
        }

        footer {
            margin-top: 60px;
            font-style: italic;
            color: #708090;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>BART IS LISTENING</h1>
    <textarea id="userInput" placeholder="Unburden your soul here..."></textarea>
    <br>
    <button onclick="sendMessage()">PROCEED</button>

    <div id="response"></div>

    <footer>
        Bart speaks from the abyss: <span id="footer-quote"><em>“Anomalisa (2015): Everyone sounds the same to a lonely man—until one woman doesn’t. Curious. But not clever.”</em></span>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const textarea = document.getElementById("userInput");

            textarea.addEventListener("keydown", function (e) {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        });

        function sendMessage() {
            const message = document.getElementById("userInput").value;
            fetch("/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("response").innerText = data.response;
            })
            .catch(error => {
                document.getElementById("response").innerText = "Something broke in the void...";
                console.error(error);
            });
        }
    </script>
</body>
</html>
