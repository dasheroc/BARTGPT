<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bart Interface</title>
    <link rel="icon" type="image/x-icon" href="{{ request.url_for('static', path='favicon.ico') }}">
    <style>
        body {
            background-color: #0a0c10;
            color: #b0c4d4;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
        }
        form {
            width: 60%;
            max-width: 900px;
        }
        textarea {
            width: 100%;
            height: 200px;
            background-color: #121417;
            color: #d3e0ea;
            font-size: 1.2rem;
            padding: 1rem;
            border: 1px solid #2a2e35;
            resize: none;
        }
        button {
            margin-top: 1rem;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            background-color: #2a2e35;
            color: #9ac8e0;
            border: none;
            cursor: pointer;
        }
        .response {
            margin-top: 2rem;
            font-size: 1.2rem;
            color: #84d1e0;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Bart is listening</h1>
    <form method="post" id="chat-form">
        <textarea name="user_input" placeholder="Unburden your soul here..." required></textarea>
        <button type="submit">PROCEED</button>
    </form>
    {% if bart_reply %}
        <div class="response">{{ bart_reply }}</div>
    {% endif %}

    <script>
        document.getElementById('chat-form').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                this.submit();
            }
        });
    </script>
</body>
</html>
