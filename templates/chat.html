<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bart is listening…</title>

  <!-- Favicon with cache-busting -->
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico?v=3" />
  <link rel="shortcut icon" type="image/x-icon" href="/static/favicon.ico?v=3" />

  <style>
    body {
      background-color: #111;
      color: #ffd700;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      padding-top: 100px;
    }

    textarea {
      width: 60%;
      height: 150px;
      background-color: #1c1c1c;
      color: #ccc;
      border: 1px solid #555;
      padding: 10px;
      font-size: 16px;
      resize: none;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      background-color: #ffd700;
      border: none;
      color: #000;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background-color: #ffcc00;
    }

    form {
      display: inline-block;
    }
  </style>
</head>
<body>
  <h1>Bart is listening...</h1>
  <form method="POST">
    <textarea name="prompt" placeholder="Unburden your soul here..." required></textarea><br>
    <button type="submit">Submit to Bart</button>
  </form>

  <script>
    document.querySelector("textarea").addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        this.form.submit();
      }
    });
  </script>
</body>
</html>
