<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BartAPI Chat</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='favicon.ico') }}">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #0e0e0e;
            color: #f5f5f5;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80%;
            max-width: 900px;
        }
        textarea {
            width: 100%;
            height: 200px;
            background-color: #1e1e1e;
            color: #f5f5f5;
            border: 1px solid #777;
            padding: 12px;
            font-size: 16px;
            resize: none;
            margin-bottom: 20px;
        }
        button {
            background-color: #222;
            color: #f5f5f5;
            font-size: 18px;
            padding: 12px 36px;
            border: 1px solid #666;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background-color: #333;
        }
        .response {
            margin-top: 40px;
            background-color: #1a1a1a;
            border: 1px solid #444;
            padding: 20px;
            width: 80%;
            max-width: 900px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <form method="post">
        <textarea name="user_input" placeholder="Speak, friend…"></textarea>
        <button type="submit">PROCEED</button>
    </form>

    {% if user_input %}
    <div class="response">
        <strong>You said:</strong> {{ user_input }}
    </div>
    {% endif %}
</body>
</html>
