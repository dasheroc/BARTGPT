<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BART IS LISTENING</title>
  <style>
    body {
      margin: 0;
      background-color: #0c0f17;
      color: #ccc;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 3rem;
      color: #cbd5e1;
      letter-spacing: 0.1em;
    }

    form {
      width: 80%;
      max-width: 900px;
    }

    textarea {
      width: 100%;
      height: 300px;
      background-color: #111;
      border: 1px solid #555;
      color: #9fc;
      padding: 1rem;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      resize: none;
    }

    button {
      margin-top: 1rem;
      padding: 0.7rem 1.4rem;
      font-size: 1rem;
      background-color: #1f2937;
      color: #fefefe;
      border: 1px solid #444;
      cursor: pointer;
    }

    .response {
      margin-top: 2rem;
      max-width: 900px;
      color: #8ae;
      font-style: italic;
    }

    footer {
      margin-top: 2rem;
      color: #5eead4;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1>BART IS LISTENING</h1>
  <form method="POST" id="bart-form">
    <textarea name="soul" placeholder="Unburden your soul here..." required></textarea>
    <br />
    <button type="submit">PROCEED</button>
  </form>

  {% if result %}
    <div class="response">
      Bart speaks from the abyss: "{{ result }}"
    </div>
  {% endif %}

  <footer>
    Bart speaks from the abyss: “What time is it?” — curious. But not clever.
  </footer>

  <script>
    const form = document.getElementById("bart-form");
    const textarea = form.querySelector("textarea");

    textarea.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.submit();
      }
    });
  </script>
</body>
</html>
