<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bart is Listening</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #060b16;
      color: #ccc;
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      margin: 0;
      padding: 3em 1em;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 1em;
      color: #ccc;
      letter-spacing: 0.1em;
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 960px;
    }

    textarea {
      width: 100%;
      min-height: 300px;
      background-color: #111;
      color: #a9b7c6;
      border: 1px solid #444;
      font-size: 1em;
      padding: 1em;
      resize: vertical;
      font-family: 'Share Tech Mono', monospace;
      margin-bottom: 1.5em;
    }

    button {
      background-color: #111;
      color: #f2f2f2;
      border: 1px solid #666;
      padding: 0.8em 2em;
      font-size: 1em;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      transition: background-color 0.3s, color 0.3s;
    }

    button:hover {
      background-color: #333;
      color: #fff;
    }

    .response {
      margin-top: 2em;
      font-style: italic;
      font-size: 1.1em;
      color: #4eb3f5;
      text-align: center;
      max-width: 960px;
      line-height: 1.5em;
    }

    .footer {
      margin-top: 2em;
      font-size: 0.9em;
      color: #81d8d0;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>BART IS LISTENING</h1>
  <form method="post" action="/" onsubmit="return handleSubmit()">
    <textarea name="user_input" placeholder="Unburden your soul here..." required></textarea>
    <button type="submit">PROCEED</button>
  </form>
  {% if response %}
    <div class="response">Bart speaks from the abyss: "{{ response }}"</div>
  {% endif %}
  <div class="footer">
    Bart speaks from the abyss: “What time is it?” — curious. But not clever.
  </div>

  <script>
    function handleSubmit() {
      const form = document.querySelector("form");
      const button = form.querySelector("button");
      button.disabled = true;
      button.innerText = "Listening...";
      return true;
    }

    document.addEventListener("DOMContentLoaded", function () {
      const textarea = document.querySelector("textarea");
      textarea.focus();
      textarea.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          this.form.requestSubmit();
        }
      });
    });
  </script>
</body>
</html>
