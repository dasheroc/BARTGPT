<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bart is listening...</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 2rem;
        }

        h1 {
            color: #ffcc33;
        }

        form {
            margin-top: 1.5rem;
        }

        textarea {
            width: 80%;
            height: 100px;
            background-color: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
            padding: 1rem;
            resize: none;
        }

        button {
            margin-top: 1rem;
            padding: 0.75rem 1.5rem;
            background-color: #ffcc33;
            color: #111;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .judgment {
            color: #ffcc33;
            margin-top: 2rem;
            font-size: 1.25rem;
        }
    </style>
</head>

<body>
    <h1>Bart is listening...</h1>
    <form method="post" action="/" enctype="application/x-www-form-urlencoded">
        <textarea name="soul" placeholder="Unburden your soul here..." required></textarea><br>
        <button type="submit">Submit to Bart</button>
    </form>

    {% if judgment %}
    <div class="judgment">
        Judgment Returned:<br>
        {{ judgment }}
    </div>
    {% endif %}
</body>

</html>
