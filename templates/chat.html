<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BART IS LISTENING</title>
  <style>
    body {
      background-color: #070d1f;
      color: #cfd8dc;
      font-family: 'Courier New', monospace;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 100px;
      font-size: 2.5rem;
      letter-spacing: 2px;
    }

    form {
      margin-top: 40px;
    }

    textarea {
      background-color: #111;
      color: #e0e0e0;
      width: 700px;
      height: 160px;
      border: none;
      padding: 20px;
      font-size: 16px;
      resize: none;
    }

    button {
      margin-top: 25px;
      padding: 12px 30px;
      background-color: #202020;
      color: #fff;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .footer {
      margin-top: 60px;
      font-size: 14px;
      color: #81d4fa;
    }

    .response {
      margin-top: 40px;
      width: 700px;
      margin-left: auto;
      margin-right: auto;
      color: #b2ff59;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>BART IS LISTENING</h1>
  <form method="post">
    <textarea name="prompt" placeholder="Unburden your soul here...">{{ prompt or "" }}</textarea>
    <br>
    <button type="submit">PROCEED</button>
  </form>
  {% if response %}
    <div class="response"><strong>Bart speaks from the abyss:</strong><br>{{ response }}</div>
  {% endif %}
  <div class="footer">
    Bart speaks from the abyss: “What time is it?” — curious. But not clever.
  </div>
</body>
</html>
