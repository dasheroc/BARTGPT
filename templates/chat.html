<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bart Is Listening</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0a0f1c;
            color: #c7cdd3;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 30px;
            text-align: center;
        }
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80%;
            max-width: 800px;
        }
        textarea {
            width: 100%;
            height: 300px;
            background-color: #0f111a;
            color: #c7cdd3;
            font-size: 1rem;
            padding: 20px;
            border: 1px solid #333;
            resize: none;
            font-family: 'Share Tech Mono', monospace;
        }
        button {
            margin-top: 20px;
            background-color: #11131a;
            color: #eee;
            border: 1px solid #555;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
        }
        .omdb-response {
            margin-top: 40px;
            font-size: 1rem;
            font-style: italic;
            color: #87cefa;
            text-align: center;
            width: 70%;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #8ff;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>BART IS LISTENING</h1>
    <form method="post">
        <textarea name="soul" required placeholder="Unburden your soul here...">{{ input_text }}</textarea>
        <button type="submit">PROCEED</button>
    </form>
    {% if response %}
    <div class="omdb-response">
        Bart speaks from the abyss: "{{ response }}"
    </div>
    {% endif %}
    <div class="footer">
        Bart speaks from the abyss: “What time is it?” – curious. But not clever.
    </div>
</body>
</html>
