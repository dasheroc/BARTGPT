<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bart is listening...</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b1320;
            color: #c0c0c0;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80%;
            max-width: 800px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background-color: #111;
            color: #ccc;
            font-size: 1em;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 4px;
            resize: none;
            font-family: 'Share Tech Mono', monospace;
            margin-bottom: 16px;
        }

        button {
            padding: 10px 20px;
            background-color: #111;
            color: #e5e5e5;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover {
            background-color: #000;
            color: #fff;
        }

        .response {
            margin-top: 30px;
            background-color: #111;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #333;
            width: 80%;
            max-width: 800px;
        }
    </style>
</head>
<body>
    <h1>Bart is listening</h1>
    <form method="post" action="/">
        <textarea name="soul" placeholder="Unburden your soul here..." required></textarea>
        <button type="submit">PROCEED</button>
    </form>

    {% if response %}
    <div class="response">
        {{ response|safe }}
    </div>
    {% endif %}

    <script>
        // Submit on Enter (unless Shift+Enter)
        document.querySelector("textarea").addEventListener("keydown", function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                this.form.submit();
            }
        });
    </script>
</body>
</html>
