<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BartAPI Chat</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='favicon.ico') }}">
    <style>
        body {
            background-color: #0e0e0e;
            color: #f5f5f5;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        textarea {
            width: 60%;
            height: 150px;
            background-color: #1e1e1e;
            color: #f5f5f5;
            border: 1px solid #444;
            padding: 10px;
            font-size: 16px;
            resize: none;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #222;
            color: #f5f5f5;
            border: 1px solid #555;
            cursor: pointer;
        }
        .response {
            margin-top: 30px;
            width: 60%;
            background-color: #1a1a1a;
            padding: 15px;
            border: 1px solid #333;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <form method="post">
        <textarea name="user_input" placeholder="Speak, friend…"></textarea>
        <br>
        <button type="submit">PROCEED</button>
    </form>

    {% if user_input %}
    <div class="response">
        <strong>You said:</strong> {{ user_input }}
    </div>
    {% endif %}
</body>
</html>
