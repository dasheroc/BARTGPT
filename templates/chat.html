<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bart is listening...</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='favicon.ico') }}">
    <style>
        body {
            background-color: #111;
            color: #ffd700;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding-top: 10%;
        }
        textarea {
            background-color: #1c1c1c;
            color: #ccc;
            border: 1px solid #444;
            width: 50%;
            height: 120px;
            font-size: 16px;
            padding: 10px;
            resize: none;
        }
        button {
            background-color: #ffd700;
            color: #000;
            border: none;
            padding: 10px 20px;
            margin-top: 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .response {
            margin-top: 40px;
            color: #fff;
        }
    </style>
</head>
<body>
    <h1>Bart is listening...</h1>
    <form method="post">
        <textarea name="soul" placeholder="Unburden your soul here..." required></textarea><br>
        <button type="submit">Submit to Bart</button>
    </form>
    {% if response %}
        <div class="response">{{ response }}</div>
    {% endif %}
</body>
</html>
