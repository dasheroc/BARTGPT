<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bart is Listening</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Major+Mono+Display&display=swap');

    body {
      background-color: #050b18;
      color: #cbd5e1;
      font-family: 'Major Mono Display', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100vh;
      margin: 0;
      padding-top: 2rem;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 2rem;
      color: #dbeafe;
    }

    textarea {
      width: 80%;
      height: 300px;
      background-color: #0d1117;
      color: #94a3b8;
      border: 1px solid #475569;
      padding: 1rem;
      font-family: 'Major Mono Display', monospace;
      font-size: 1rem;
      resize: none;
    }

    button {
      margin-top: 1rem;
      padding: 0.75rem 1.5rem;
      background-color: #0f172a;
      color: #f1f5f9;
      border: 1px solid #475569;
      cursor: pointer;
      font-family: 'Major Mono Display', monospace;
      font-size: 1rem;
    }

    button:hover {
      background-color: #1e293b;
    }

    .response {
      margin-top: 2rem;
      color: #7dd3fc;
      width: 80%;
      text-align: center;
      font-size: 1rem;
    }

    .footer-quote {
      margin-top: 1.5rem;
      color: #67e8f9;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>BART IS LISTENING</h1>
  <textarea id="userInput" placeholder="Unburden your soul here..."></textarea>
  <button onclick="submitForm()">PROCEED</button>
  <div class="response" id="responseText"></div>
  <div class="footer-quote" id="bartQuote"></div>

  <script>
    const quotes = [
      `"What time is it?" — curious. But not clever.`,
      `"A name isn't an answer. It’s a wound."`,
      `"What you avoid speaks louder than what you say."`,
      `"The mirror doesn’t lie. It edits."`
    ];

    function getRandomQuote() {
      return quotes[Math.floor(Math.random() * quotes.length)];
    }

    function submitForm() {
      const input = document.getElementById("userInput").value;
      if (!input.trim()) return;

      fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: input }),
      })
      .then(response => response.json())
      .then(data => {
        const responseDiv = document.getElementById("responseText");
        responseDiv.innerHTML = `Bart speaks from the abyss: <em>"${data.response}"</em>`;
        document.getElementById("bartQuote").textContent = "Bart speaks from the abyss: " + getRandomQuote();
      });
    }

    document.getElementById("userInput").addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        submitForm();
      }
    });

    document.getElementById("bartQuote").textContent = "Bart speaks from the abyss: " + getRandomQuote();
  </script>
</body>
</html>
