<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bart Is Listening</title>
  <style>
    body {
      background-color: #111;
      color: #bcc7d6;
      font-family: 'Courier New', monospace;
      text-align: center;
      padding: 2rem;
    }
    textarea {
      width: 60%;
      height: 200px;
      background: #1a1a1a;
      color: #bcc7d6;
      border: 1px solid #888;
      padding: 1rem;
      font-size: 1rem;
    }
    button {
      background: #222;
      color: #bcc7d6;
      padding: 0.6rem 1.2rem;
      border: 1px solid #888;
      font-size: 1rem;
      margin-top: 1rem;
    }
    #response {
      margin-top: 2rem;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>BART IS LISTENING</h1>

  <form id="soulForm">
    <textarea id="user_input" placeholder="Unburden your soul here..."></textarea><br>
    <button type="submit">PROCEED</button>
  </form>

  <div id="response"></div>

  <script>
    document.getElementById("soulForm").addEventListener("submit", async function(event) {
      event.preventDefault();

      const input = document.getElementById("user_input").value;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ input: input })
        });

        const data = await res.json();
        document.getElementById("response").innerText = data.response || "Bart says nothing.";
      } catch (err) {
        document.getElementById("response").innerText = "Bart has laryngitis. Something went wrong.";
        console.error("Bart error:", err);
      }
    });
  </script>
</body>
</html>
