<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bart Interface</title>

  <!-- Favicon (cache-busted) -->
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}?v=judgment" type="image/x-icon"/>

  <!-- Share Tech Mono (the “Bart” font) -->
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

  <style>
    :root{
      --bg: #0b0e16;
      --ink: #cfd8dc;
      --panel: #111418;
      --panel-border: #2a2f36;
      --btn: #2a2f36;
      --btn-ink: #e6edf3;
      --muted: #9ad6d6;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background-color:var(--bg);
      color:var(--ink);
      font-family:"Share Tech Mono", monospace;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding:4rem 1.5rem 3rem;
      gap:2rem;
    }

    h1{
      margin:0;
      letter-spacing:.08em;
      font-weight:600;
      font-size:clamp(28px, 4vw, 56px);
      text-align:center;
      color:#c7ced6;
    }

    .shell{
      width:min(92rem, 94vw);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:1.5rem;
    }

    .panel{
      width:100%;
      min-height:18rem;
      background:#0f1216;
      border:1px solid var(--panel-border);
      border-radius:6px;
      padding:1.25rem;
    }

    textarea{
      width:100%;
      height:100%;
      min-height:18rem;
      background:transparent;
      color:var(--ink);
      border:none;
      outline:none;
      resize:vertical;
      font:inherit;
      line-height:1.5;
    }
    textarea::placeholder{color:#7f8a94}

    .actions{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      margin-top:.25rem;
    }

    button{
      background:var(--btn);
      color:var(--btn-ink);
      border:1px solid #3a4048;
      border-radius:8px;
      padding:.9rem 1.6rem;
      letter-spacing:.08em;
      font-family:inherit;
      font-size:clamp(14px, 1.8vw, 18px);
      cursor:pointer;
      transition:transform .04s ease, opacity .15s ease, background .15s ease;
    }
    button:hover{opacity:.92}
    button:active{transform:translateY(1px)}

    .out{
      width:min(92rem, 94vw);
      text-align:center;
      color:var(--muted);
      font-size:clamp(14px, 1.6vw, 18px);
      line-height:1.6;
      margin-top:.5rem;
    }

    .fade{opacity:.65}
  </style>
</head>

<body>
  <h1>BART IS LISTENING</h1>

  <div class="shell">
    <form id="chat-form" method="post" action="/chat">
      <div class="panel">
        <textarea
          name="user_input"
          placeholder="Unburden your soul here..."
          autofocus
          required
        ></textarea>
      </div>
      <div class="actions">
        <button type="submit" id="go">PROCEED</button>
      </div>
    </form>
  </div>

  <div class="out{{ ' fade' if not response }}">
    {{ response or "Bart speaks from the abyss: “What time is it?” — curious. But not clever." }}
  </div>

  <script>
    // Submit on Enter (no Shift)
    const ta = document.querySelector("textarea");
    const form = document.getElementById("chat-form");
    ta.addEventListener("keydown", (e)=>{
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        form.requestSubmit();
      }
    });

    // Double‑submit guard
    form.addEventListener("submit", (e)=>{
      const btn = document.getElementById("go");
      btn.disabled = true;
      btn.style.opacity = .7;
      setTimeout(()=>{ btn.disabled = false; btn.style.opacity = 1; }, 2000);
    });
  </script>
</body>
</html>
