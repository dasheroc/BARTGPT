<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bart Interface</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}?v=judgment" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #0b0e16;
      color: #cfd8dc;
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 2rem;
      text-align: center;
    }

    textarea {
      width: 90%;
      max-width: 900px;
      height: 300px;
      background-color: #111;
      color: #cfd8dc;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      padding: 1rem;
      border: 1px solid #444;
      resize: none;
    }

    button {
      margin-top: 1rem;
      padding: 0.75rem 1.5rem;
      background-color: #333;
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #555;
    }

    .response {
      margin-top: 2rem;
      font-style: italic;
      font-size: 1rem;
      text-align: center;
      max-width: 900px;
      padding: 0 1rem;
      color: #91d0f0;
    }
  </style>
</head>
<body>
  <h1>BART IS LISTENING</h1>
  <form method="POST" id="chat-form">
    <textarea name="user_input" placeholder="Unburden your soul here..." required></textarea>
    <br />
    <button type="submit">PROCEED</button>
  </form>
  {% if response %}
    <div class="response">{{ response }}</div>
  {% endif %}
  <script>
    document.getElementById("chat-form").addEventListener("submit", function(e) {
      const btn = this.querySelector("button");
      btn.disabled = true;
      btn.innerText = "Summoning Bart...";
    });

    document.querySelector("textarea").addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        document.getElementById("chat-form").requestSubmit();
      }
    });
  </script>
</body>
</html>
