<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bart is Listening</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0e1117;
            color: #bdcbe0;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            padding-top: 5vh;
            margin: 0;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 800px;
        }

        textarea {
            width: 100%;
            height: 250px;
            background-color: #111;
            color: #ccc;
            font-size: 1.2rem;
            padding: 15px;
            border: 1px solid #444;
            border-radius: 4px;
            resize: none;
            margin-bottom: 1.5rem;
        }

        button {
            padding: 0.75rem 2rem;
            font-size: 1.1rem;
            background-color: #2c2f36;
            color: #ccc;
            border: 1px solid #555;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #3b3f47;
        }

        .response {
            margin-top: 3rem;
            font-style: italic;
            font-size: 1.2rem;
            color: #79c2d0;
            max-width: 90%;
            text-align: center;
            line-height: 1.6;
        }

        .response em {
            font-weight: bold;
            color: #b5d4e2;
        }
    </style>
</head>
<body>
    <h1>BART IS LISTENING</h1>
    <form method="POST" action="/" onsubmit="return handleSubmit(event)">
        <textarea name="user_input" placeholder="Unburden your soul here..." required></textarea>
        <button type="submit">PROCEED</button>
    </form>
    {% if response %}
    <div class="response">
        Bart speaks from the abyss: <em>“{{ response }}”</em> — curious. But not clever.
    </div>
    {% endif %}
    <script>
        function handleSubmit(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            fetch("/", {
                method: "POST",
                body: formData
            })
            .then(response => response.text())
            .then(html => document.documentElement.innerHTML = html)
            .catch(err => console.error("Bart had an existential crisis:", err));
            return false;
        }

        document.querySelector("textarea").addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                document.querySelector("form").dispatchEvent(new Event("submit"));
            }
        });
    </script>
</body>
</html>
