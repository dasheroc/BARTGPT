<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BartGPT</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0a0e17;
            color: #c5c6c7;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 3rem;
            color: #b0b4bd;
            margin-bottom: 2rem;
        }

        form {
            width: 80%;
            max-width: 900px;
        }

        textarea {
            width: 100%;
            height: 300px;
            background-color: #111;
            color: #87ceeb;
            border: 1px solid #444;
            padding: 1rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            resize: none;
        }

        button {
            margin-top: 1rem;
            padding: 0.75rem 2rem;
            background-color: #1f1f1f;
            color: #f0f0f0;
            border: 1px solid #888;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
        }

        .response, .footer {
            margin-top: 2rem;
            width: 80%;
            max-width: 900px;
            color: #80c7e0;
            font-style: italic;
        }

        .footer {
            color: #8edce6;
            text-align: center;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <h1>BART IS LISTENING</h1>
    <form method="post">
        <textarea name="soul" placeholder="Unburden your soul here..." required autofocus></textarea>
        <div style="text-align: center;">
            <button type="submit">PROCEED</button>
        </div>
    </form>

    {% if response %}
        <div class="response">
            Bart speaks from the abyss: "<span>{{ response }}</span>"
        </div>
    {% endif %}

    <div class="footer">
        Bart speaks from the abyss: “What time is it?” – curious. But not clever.
    </div>

    <script>
        const form = document.querySelector('form');
        const textarea = document.querySelector('textarea');

        textarea.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                form.submit();
            }
        });
    </script>
</body>
</html>
