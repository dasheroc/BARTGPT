<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bart is Listening</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <style>
    body {
      background-color: #111;
      color: #d6d6d6;
      font-family: 'Courier New', monospace;
      text-align: center;
      margin: 0;
      padding: 2em;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 1em;
      color: #b2c4d6;
      letter-spacing: 2px;
    }

    textarea {
      width: 60%;
      height: 200px;
      background-color: #1c1c1c;
      color: #d6d6d6;
      font-size: 1.1em;
      padding: 1em;
      border: 1px solid #999;
      resize: vertical;
    }

    button {
      margin-top: 1em;
      padding: 0.6em 1.2em;
      font-size: 1em;
      background-color: #333;
      color: #f0f0f0;
      border: 1px solid #666;
      cursor: pointer;
    }

    button:hover {
      background-color: #555;
    }

    .response {
      margin-top: 2em;
      font-style: italic;
      color: #d0d0d0;
    }

    .emoji {
      font-size: 1.5em;
      margin-right: 0.5em;
    }
  </style>
</head>

<body>
  <h1>BART IS LISTENING</h1>
  
  <form id="soulForm">
    <textarea id="input" name="user_input" required autofocus> </textarea><br />
    <button type="submit" id="proceed">PROCEED</button>
  </form>

  <div class="response">
    <span class="emoji">🧠</span>
    <span id="response">{{ response }}</span>
  </div>

  <script>
    document.getElementById("soulForm").addEventListener("submit", async function (event) {
      event.preventDefault();

      const input = document.getElementById("input").value;
      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user_input: input })
        });

        const data = await res.json();
        document.getElementById("response").innerText = data.response || "Bart says nothing.";
      } catch (err) {
        document.getElementById("response").innerText = "Bart has laryngitis. Something went wrong.";
        console.error("Bart error:", err);
      }
    });

    // Enable Enter key to trigger the PROCEED button
    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("input").addEventListener("keydown", function (event) {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault(); // prevent newline
          document.getElementById("proceed").click();
        }
      });
    });
  </script>
</body>
</html>
