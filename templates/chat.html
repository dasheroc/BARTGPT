<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bart is listening...</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='favicon.ico') }}">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b1320;
            color: #c0c0c0;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            color: #c0c0c0;
            font-size: 2.8em;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80%;
            max-width: 1000px;
        }

        textarea {
            width: 100%;
            height: 200px;
            background-color: #111;
            color: #ccc;
            font-size: 1em;
            padding: 15px;
            border: 1px solid #555;
            border-radius: 4px;
            resize: none;
            margin-bottom: 20px;
            font-family: monospace;
        }

        button {
            padding: 12px 24px;
            background-color: #111;
            color: #e5e5e5;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 1.1em;
            cursor: pointer;
            text-transform: uppercase;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        button:hover {
            background-color: #000;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <h1>BART IS LISTENING</h1>
    <form method="post">
        <textarea name="user_input" placeholder="Unburden your soul here..." required></textarea>
        <button type="submit">PROCEED</button>
    </form>

    <script>
        // Submit on Enter (unless Shift+Enter)
        document.querySelector("textarea").addEventListener("keydown", function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                this.form.submit();
            }
        });
    </script>
</body>
</html>
