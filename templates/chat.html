<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bart is Listening</title>
  <style>
    body {
      background-color: #060b16;
      color: #c0c0c0;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 40px;
      letter-spacing: 2px;
      color: #c4c4c4;
    }

    textarea {
      width: 700px;
      height: 250px;
      background-color: #0d0d0d;
      color: #c0ffff;
      border: 1px solid #222;
      font-family: monospace;
      font-size: 1em;
      padding: 20px;
      resize: vertical;
    }

    button {
      margin-top: 20px;
      padding: 10px 30px;
      font-size: 1.2em;
      background-color: #222;
      color: #c0c0c0;
      border: 1px solid #555;
      cursor: pointer;
    }

    button:hover {
      background-color: #333;
    }

    p {
      margin-top: 40px;
      font-size: 1.1em;
      color: #80ffff;
      max-width: 800px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>BART IS LISTENING</h1>
  <textarea id="userInput" placeholder="Unburden your soul here..."></textarea>
  <button onclick="sendToBart()">PROCEED</button>
  <p id="responseArea">Bart speaks from the abyss: “What time is it?” — curious. But not clever.</p>

  <script>
    async function sendToBart() {
      const text = document.getElementById("userInput").value;
      const response = await fetch("/sealema", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
      });
      const data = await response.json();
      document.getElementById("responseArea").textContent = data.response;
    }
  </script>
</body>
</html>
