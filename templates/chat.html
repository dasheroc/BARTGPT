<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bart Is Listening</title>
  <style>
    body {
      background-color: #0a0d14;
      color: #dce3ec;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100vh;
      margin: 0;
      padding-top: 40px;
    }

    h1 {
      font-size: 2.5rem;
      color: #cdd9e5;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    textarea {
      background-color: #111;
      color: #cdd9e5;
      font-family: 'Courier New', Courier, monospace;
      width: 80%;
      height: 250px;
      padding: 12px;
      border: 1px solid #ccc;
      font-size: 1rem;
      resize: vertical;
    }

    button {
      margin-top: 20px;
      background-color: #333;
      color: #f0f0f0;
      border: none;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      font-family: 'Courier New', Courier, monospace;
    }

    button:hover {
      background-color: #444;
    }

    #response {
      margin-top: 30px;
      font-style: italic;
      font-size: 1.1rem;
      color: #9ae3ff;
      text-align: center;
      max-width: 80%;
    }
  </style>
</head>
<body>
  <h1>BART IS LISTENING</h1>
  <form id="soulForm">
    <textarea id="input" placeholder="Unburden your soul here..." required></textarea>
    <br />
    <button type="submit" id="proceed">PROCEED</button>
  </form>
  <div id="response"></div>

  <script>
    document.getElementById("soulForm").addEventListener("submit", async function (event) {
      event.preventDefault();
      const input = document.getElementById("input").value.trim();
      if (!input) return;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ input }),
        });

        const data = await res.json();
        document.getElementById("response").innerText = data.response || "Bart says nothing.";
      } catch (err) {
        document.getElementById("response").innerText = "Bart has laryngitis. Something went wrong.";
        console.error("Bart error:", err);
      }
    });

    // Enable Enter key to trigger the PROCEED button
    document.getElementById("input").addEventListener("keydown", function (event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault(); // prevent newline
        document.getElementById("proceed").click();
      }
    });
  </script>
</body>
</html>
