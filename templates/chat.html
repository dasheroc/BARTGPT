<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bart is Listening</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <style>
        body {
            background-color: #121212;
            color: #cbd5e1;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            padding-top: 40px;
        }

        h1 {
            font-size: 3em;
            letter-spacing: 0.1em;
            margin-bottom: 30px;
        }

        textarea {
            width: 60vw;
            height: 300px;
            background-color: #1e1e1e;
            color: #cbd5e1;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            padding: 10px;
            font-size: 1em;
            resize: none;
            margin-bottom: 20px;
        }

        button {
            background-color: #2c2c2c;
            color: #cbd5e1;
            border: 1px solid #cbd5e1;
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out;
        }

        button:hover {
            background-color: #383838;
        }

        #response {
            margin-top: 30px;
            font-size: 1.1em;
            text-align: center;
            max-width: 70%;
            color: #94a3b8;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.9em;
            color: #64748b;
            text-align: center;
            padding-bottom: 20px;
            max-width: 80%;
        }

        em {
            font-style: italic;
            color: #94bfe9;
        }
    </style>
</head>
<body>
    <h1>BART IS LISTENING</h1>
    <textarea id="userInput" placeholder="Unburden your soul here..."></textarea>
    <button onclick="sendMessage()">PROCEED</button>

    <div id="response"></div>

    <div class="footer">
        <p><em>Bart speaks from the abyss: “Anomalisa (2015): Everyone sounds the same to a lonely man—until one woman doesn’t. Curious. But not clever.”</em></p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const textarea = document.getElementById("userInput");

            textarea.addEventListener("keydown", function (e) {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        });

        function sendMessage() {
            const message = document.getElementById("userInput").value.trim();
            if (!message) return;

            fetch("/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message })
            })
            .then(response => {
                if (!response.ok) throw new Error("Network response was not ok.");
                return response.json();
            })
            .then(data => {
                document.getElementById("response").innerText = data.response;
            })
            .catch(error => {
                document.getElementById("response").innerText = "Bart has laryngitis. Something went wrong.";
                console.error("Error:", error);
            });
        }
    </script>
</body>
</html>
