<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bart is listening...</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 2rem;
        }

        h1 {
            color: #ffcc33;
        }

        form {
            margin-top: 1.5rem;
        }

        textarea {
            width: 80%;
            height: 100px;
            background-color: #1a1a1a;
            color: #fff;
            border: none;
            padding: 1rem;
            font-size: 1rem;
            resize: vertical;
        }

        button {
            background-color: #ffcc33;
            color: #111;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: background-color 0.2s ease-in-out;
        }

        button:hover {
            background-color: #e6b800;
        }

        .judgment {
            margin-top: 2rem;
            font-weight: bold;
            font-size: 1.2rem;
            color: #ffcc33;
        }
    </style>
</head>

<body>
    <h1>Bart is listening...</h1>
    <form method="post" action="/">
        <textarea name="soul" placeholder="Unburden your soul here..." required></textarea><br>
        <button type="submit">Submit to Bart</button>
    </form>

    {% if judgment %}
    <div class="judgment">
        Judgment Returned:<br>
        {{ judgment }}
    </div>
    {% endif %}
</body>

</html>
