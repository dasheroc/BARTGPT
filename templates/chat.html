<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bart Interface</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}?v=judgment" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    body {
      background-color: #0b0e16;
      color: #cfd8dc;
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1.5rem;
    }

    textarea {
      width: 80vw;
      max-width: 800px;
      height: 200px;
      background-color: #111;
      color: #cfd8dc;
      font-family: 'Share Tech Mono', monospace;
      border: 1px solid #333;
      padding: 1rem;
      resize: none;
      font-size: 1rem;
    }

    button {
      margin-top: 1rem;
      background-color: #333;
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      padding: 0.75rem 2rem;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }

    .response {
      margin-top: 2rem;
      font-size: 1.25rem;
      color: #7fffd4;
      text-align: center;
      max-width: 800px;
    }
  </style>
</head>
<body>
  <h1>BART IS LISTENING</h1>
  <form id="chat-form" method="POST">
    <textarea name="user_input" placeholder="Unburden your soul here..." required></textarea>
    <br />
    <button type="submit">PROCEED</button>
  </form>

  {% if response %}
    <div class="response">
      Bart speaks from the abyss: “{{ response }}”
    </div>
  {% endif %}

  <script>
    document.querySelector("textarea").addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        document.getElementById("chat-form").requestSubmit();
      }
    });
  </script>
</body>
</html>
