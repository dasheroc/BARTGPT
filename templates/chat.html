<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BART IS LISTENING</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0e1013;
            color: #b2c7d9;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            letter-spacing: 3px;
        }
        form {
            width: 100%;
            max-width: 800px;
            padding: 0 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            background-color: #1a1b1f;
            color: #cccccc;
            border: 1px solid #444;
            padding: 10px;
            font-size: 1em;
            resize: none;
        }
        button {
            margin-top: 15px;
            padding: 12px 24px;
            background-color: #1f1f1f;
            border: 1px solid #444;
            color: #b2c7d9;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #2a2a2a;
        }
        .fact {
            margin-top: 50px;
            color: #79c2f5;
            text-align: center;
            font-style: italic;
            font-size: 1.1em;
            line-height: 1.5;
            max-width: 800px;
            padding: 0 20px;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const textarea = document.querySelector("textarea");
            const form = document.querySelector("form");
            textarea.focus();

            textarea.addEventListener("keydown", function(event) {
                if (event.key === "Enter" && !event.shiftKey) {
                    event.preventDefault();
                    form.submit();
                }
            });
        });
    </script>
</head>
<body>
    <h1>BART IS LISTENING</h1>
    <form method="POST">
        <textarea name="prompt" placeholder="Unburden your soul here..."></textarea>
        <button type="submit">PROCEED</button>
    </form>
    {% if fact %}
        <div class="fact">Bart speaks from the abyss: “{{ fact }}”</div>
    {% endif %}
</body>
</html>
