<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BartGPT — Sealema</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <style>
        body {
            background-color: #060d1f;
            color: #c9d1d9;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            padding-top: 50px;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 2px;
            color: #c3c6e2;
        }

        textarea {
            width: 80%;
            height: 250px;
            background-color: #0d1117;
            color: #a3b5c2;
            border: 1px solid #444c56;
            padding: 10px;
            font-size: 1rem;
            resize: none;
        }

        button {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 1rem;
            background-color: #10141f;
            color: #ffffff;
            border: 1px solid #444c56;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #161b29;
        }

        .response {
            margin-top: 40px;
            color: #6cd4ff;
            font-size: 1.1rem;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>BART IS LISTENING</h1>
    <form method="post" action="/sealema">
        <textarea name="user_input" placeholder="Unburden your soul here..."></textarea><br>
        <button type="submit">PROCEED</button>
    </form>
    {% if response %}
    <div class="response">
        {{ response }}
    </div>
    {% endif %}
</body>
</html>
